<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bgGrad)"/>

  <!-- Top gloss shine -->
  <rect width="200" height="100" rx="44" fill="url(#glowGrad)"/>

  <!-- Code brackets: < > -->
  <text x="18" y="122" font-family="monospace, sans-serif" font-size="80" font-weight="900" fill="white" opacity="1">&lt;</text>
  <text x="128" y="122" font-family="monospace, sans-serif" font-size="80" font-weight="900" fill="white" opacity="1">&gt;</text>

  <!-- Slash in middle -->
  <line x1="108" y1="55" x2="88" y2="148" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
</svg>
